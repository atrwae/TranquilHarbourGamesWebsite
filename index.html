<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>
<style>
    :root {
        --beige: #f4efe6;
        --blue: #4a7c8c;
        --bronze: #8c5a3c;
        --dark-bronze: #5c3a27;
    }

    body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background-color: var(--beige);
        color: var(--dark-bronze);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        max-width: 500px;
    }

    h1 {
        font-size: 6rem;
        margin: 0;
        color: var(--bronze);
    }

    h2 {
        margin: 10px 0;
        font-weight: 500;
    }

    p {
        color: #6b5a4d;
        margin-bottom: 30px;
    }

    .wave {
        width: 100%;
        height: 60px;
        margin: 20px 0;
        background: repeating-linear-gradient(
            90deg,
            var(--blue),
            var(--blue) 20px,
            #6fa3b3 20px,
            #6fa3b3 40px
        );
        border-radius: 10px;
    }

    a {
        display: inline-block;
        padding: 12px 25px;
        text-decoration: none;
        background-color: var(--bronze);
        color: var(--beige);
        border-radius: 25px;
        transition: all 0.3s ease;
    }

    a:hover {
        background-color: var(--dark-bronze);
        transform: translateY(-2px);
    }

    .boat {
        font-size: 2rem;
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <div class="boat">⛵</div>
    <h1>404</h1>
    <h2>Lost at Sea</h2>
    <p>The page you're looking for has drifted away from it's harbour.</p>

    <div class="wave"></div>
</div>

</body>
</html>
